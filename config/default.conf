# Production Webserv Configuration

# Main HTTP Server
server {
    listen 0.0.0.0:80;
    server_name example.com www.example.com;
    
    root /var/www/html;
    index index.html index.htm;
    
    client_max_body_size 10M;
    
    error_page 404 /404.html;
    error_page 403 /403.html;
    error_page 500 502 503 /50x.html;
    
    # Static content - read only
    location / {
        allowed_methods GET HEAD;
        directory_listing off;
    }
    
    # API endpoints
    location /api/v1 {
        allowed_methods GET POST PUT DELETE;
        client_max_body_size 5M;
    }
    
    # File uploads
    location /uploads {
        allowed_methods POST;
        upload_directory /var/www/uploads;
        client_max_body_size 50M;
    }
    
    # CGI scripts
    location /cgi-bin {
        allowed_methods GET POST;
        cgi_extension .php /usr/bin/php-cgi;
        cgi_extension .py /usr/bin/python3;
    }
    
    # Admin panel - limited methods
    location /admin {
        allowed_methods GET POST DELETE;
    }
    
    # Public downloads with directory listing
    location /downloads {
        allowed_methods GET HEAD;
        directory_listing on;
        root /var/www/public;
    }
    
    # Redirect old URLs
    location /legacy {
        redirect 301 /;
    }
}

# Development/Testing Server
server {
    listen 127.0.0.1:8000;
    server_name localhost dev.local;
    
    root /home/dev/www;
    index index.html index.php;
    
    client_max_body_size 100M;
    
    error_page 404 /dev/404.html;
    error_page 500 /dev/500.html;
    
    # Allow all methods for development
    location / {
        allowed_methods GET POST PUT DELETE;
        directory_listing on;
    }
    
    # Development uploads
    location /test-upload {
        allowed_methods POST;
        upload_directory /tmp/dev_uploads;
        client_max_body_size 200M;
    }
    
    # Development scripts
    location /dev-scripts {
        allowed_methods GET POST;
        cgi_extension .php /usr/bin/php-cgi;
        cgi_extension .py /usr/bin/python3;
        cgi_extension .sh /bin/bash;
    }
}

# API Server
server {    
    listen 0.0.0.0:8443;
    server_name api.example.com api-internal.local;
    
    root /var/www/api;
    
    client_max_body_size 2M;
    
    error_page 404 /api/error/404.json;
    error_page 500 /api/error/500.json;
    
    # API v2 - Production API
    location /v2 {
        allowed_methods GET POST PUT DELETE;
        client_max_body_size 1M;
    }
    
    # Webhooks - POST only
    location /webhooks {
        allowed_methods POST;
        client_max_body_size 512K;
    }
    
    # Health check endpoint
    location /health {
        allowed_methods GET;
    }
}
